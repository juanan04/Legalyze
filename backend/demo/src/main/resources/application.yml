spring:
  config:
    import: "optional:file:.env[.properties]"

  application:
    name: legalyze

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:change_this_secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 1 día

