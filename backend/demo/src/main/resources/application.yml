spring:
  config:
    import: "optional:file:.env[.properties]"

  application:
    name: legalyze

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:change_this_secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 horas (el frontend maneja inactividad de 15m)

openai:
  api-key: ${OPENAI_API_KEY}

gemini:
  api-key: ${GEMINI_API_KEY}

resend:
  api-key: ${RESEND_API_KEY}
  from-email: ${RESEND_FROM_EMAIL}

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  success-url: ${STRIPE_SUCCESS_URL:${app.frontend.url}/payment/success}
  cancel-url: ${STRIPE_CANCEL_URL:${app.frontend.url}/payment/cancel}

ai:
  provider: ${AI_PROVIDER}
